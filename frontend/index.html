<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYNORIX · LOGIN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --background: 222 84% 4.9%;
      --foreground: 210 40% 98%;
      --primary: 142 76% 36%;
      --primary-foreground: 355 100% 97%;
      --border: 217 32% 17%;
      --input: 217 32% 17%;
      --ring: 142 76% 36%;
      --radius: 0.85rem;
      --neon-glow: 0 0 14px #b22222, 0 0 28px #690c0c;
    }

    body {
      background: linear-gradient(135deg,#1e0f0f 0%,#140a0a 50%,#0a0303 100%);
      color: hsl(var(--foreground));
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #16a249, #9234ea, #db143c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.08em;
      text-shadow: var(--neon-glow);
      text-transform: uppercase;
    }

    .brand-sub {
      color: #ffaaaa;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
    }

    .card {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 100, 100, 0.25);
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(105,12,12,0.5), 0 0 0 1px rgba(255,80,80,0.2);
      padding: 2rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.8rem;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #ffcccc;
    }

    .card-header span {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #b22222;
      box-shadow: 0 0 15px #b22222;
      background: rgba(180,30,30,0.2);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #ffb0b0;
      display: block;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(20,8,8,0.8);
      border: 1px solid #b22222;
      border-radius: calc(var(--radius) - 2px);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #ff4d4d;
      box-shadow: 0 0 12px #b22222;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      border: none;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #b22222, #690c0c);
      color: white;
      box-shadow: 0 6px 22px #b22222;
      margin-top: 1rem;
    }

    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px #b22222;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      color: #f87171;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      min-height: 24px;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 1rem;
    }

    .loading-spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #b22222;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pill {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,80,80,0.6);
      background: rgba(105,12,12,0.3);
      backdrop-filter: blur(4px);
      font-size: 0.8rem;
      color: #ffdddd;
      text-align: center;
      width: 100%;
    }

    .status-led {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 8px;
      background: #b22222;
      box-shadow: 0 0 10px #b22222;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand">
      <div class="brand-title">DYNORIX · V-1</div>
      <div class="brand-sub">⚡ secure access terminal</div>
    </div>

    <div class="card">
      <div class="card-header">
        <span>🔐</span> authentication required
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>username</label>
          <input type="text" id="username" name="username" required placeholder="enter your username">
        </div>

        <div class="form-group">
          <label>password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn" id="loginBtn">⚡ access terminal</button>

        <div class="error-message" id="errorMessage"></div>
        
        <div class="loading" id="loading">
          <div class="loading-spinner"></div>
          <span style="color:#ffb0b0;">authenticating...</span>
        </div>
      </form>

      <div class="pill">
        <span class="status-led"></span> owner @MinhazBoii & TraderPixel_Admin
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://your-backend.vercel.app'; // Update this

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loading = document.getElementById('loading');
      const loginBtn = document.getElementById('loginBtn');
      
      loading.style.display = 'block';
      loginBtn.disabled = true;
      errorMessage.textContent = '';
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          // Record login
          await fetch(`${API_BASE_URL}/api/record-login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${data.token}`
            },
            body: JSON.stringify({ userId: data.user.id })
          });
          
          window.location.href = 'dashboard.html';
        } else {
          errorMessage.textContent = data.message || 'Invalid credentials';
          loading.style.display = 'none';
          loginBtn.disabled = false;
        }
      } catch (error) {
        errorMessage.textContent = 'Connection error. Please try again.';
        loading.style.display = 'none';
        loginBtn.disabled = false;
      }
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
